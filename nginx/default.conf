server {
    listen 80;
    listen [::]:80;

    server_name acal.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name acal.online;

    ssl_certificate /etc/nginx/sites-enabled/default/fullchain.pem;
    ssl_certificate_key /etc/nginx/sites-enabled/default/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /health {
        return 200 'I am live :)';
    }
}
