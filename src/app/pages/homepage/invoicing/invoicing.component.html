<nb-reveal-card>
  <nb-card-front>
    <nb-card>
      <nb-card-header class="flex-container-center">
        Faturamento Mensal Sintetico
      </nb-card-header>

      <nb-card-body>
        <div class="flex-container">

          <span>
            <b>{{dashboard.awaitingPaymentInvoice | number}}</b><br/>
            Emitido
          </span>

          <span>
            <b>{{dashboard.generatedInvoice | number}}</b><br/>
            Faturado
          </span>


        </div>
      </nb-card-body>
    </nb-card>
  </nb-card-front>
  <nb-card-back>
    <nb-card>
      <nb-card-header class="flex-container-center">
        Faturamento Mensal Analítico
      </nb-card-header>

      <nb-card-body>
        <div class="flex-container">

          <span>
            <b>{{dashboard.awaitingPaymentInvoiceCurrency | currency}}</b><br/>
            Emitido
          </span>

          <span>
            <b>{{dashboard.totalPaymentInvoiceCurrency | currency}}</b><br/>
            Faturado
          </span>

        </div>
      </nb-card-body>
    </nb-card>
  </nb-card-back>
</nb-reveal-card>
